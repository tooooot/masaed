<!DOCTYPE html>
<html lang="ar" dir="rtl"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>المحادثات — مساعد</title>
<style>
:root{--bg:#0f1419;--card:#1a2129;--bd:#2a3540;--tx:#e6edf3;--mut:#8b98a5;--pur:#a371f7;--grn:#3fb950;--yel:#d29922;--red:#f85149;--blu:#58a6ff;--org:#e3914e;}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--tx);font-family:-apple-system,"Segoe UI",Tahoma,sans-serif;line-height:1.6;padding:0 0 50px}
header{background:linear-gradient(135deg,#1a2129,#0f1419);border-bottom:1px solid var(--bd);padding:16px 20px;position:sticky;top:0;z-index:5}
h1{margin:0;font-size:1.2rem}
.sub{color:var(--mut);font-size:.8rem;margin-top:3px}
nav{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}
nav a{background:var(--card);border:1px solid var(--bd);color:var(--tx);text-decoration:none;padding:6px 12px;border-radius:8px;font-size:.8rem}
nav a.active{background:var(--blu);border-color:var(--blu);color:#001}
.wrap{max-width:1000px;margin:0 auto;padding:16px;display:grid;grid-template-columns:300px 1fr;gap:14px}
@media(max-width:760px){.wrap{grid-template-columns:1fr}}
.col-list{display:flex;flex-direction:column;gap:8px;max-height:78vh;overflow:auto}
.exp{background:var(--card);border:1px solid var(--bd);border-radius:10px;padding:10px 12px;cursor:pointer;border-right:4px solid var(--c,var(--bd))}
.exp:hover{border-color:var(--blu)}
.exp.sel{outline:2px solid var(--blu)}
.exp .top{display:flex;justify-content:space-between;align-items:center;gap:6px}
.exp .id{font-weight:700;font-size:.9rem}
.exp .meta{color:var(--mut);font-size:.72rem;margin-top:3px}
.exp .ph{font-size:.7rem;color:var(--mut)}
.pill{display:inline-block;padding:1px 8px;border-radius:6px;font-size:.68rem;border:1px solid var(--bd)}
.pill.g{color:var(--grn);border-color:var(--grn)} .pill.y{color:var(--yel);border-color:var(--yel)}
.pill.b{color:var(--blu);border-color:var(--blu)} .pill.r{color:var(--red);border-color:var(--red)}
.pill.p{color:var(--pur);border-color:var(--pur)}
.panel{background:var(--card);border:1px solid var(--bd);border-radius:12px;padding:0;overflow:hidden;min-height:300px}
.phead{padding:12px 14px;border-bottom:1px solid var(--bd);background:#0b0f14}
.phead h3{margin:0 0 6px;font-size:1rem}
.facts{display:flex;flex-wrap:wrap;gap:6px;font-size:.72rem}
.fact{background:#0f1419;border:1px solid var(--bd);border-radius:6px;padding:2px 8px;color:var(--mut)}
.fact b{color:var(--tx)}
.chat{padding:14px;display:flex;flex-direction:column;gap:10px}
.row{display:flex;flex-direction:column;max-width:78%}
.row.right{align-self:flex-start} /* RTL: seeker on the start (right) */
.row.left{align-self:flex-end}
.row.center{align-self:center;max-width:92%;align-items:center}
.who{font-size:.68rem;color:var(--mut);margin-bottom:2px}
.bub{padding:8px 11px;border-radius:12px;font-size:.85rem;white-space:pre-wrap;word-break:break-word}
.seeker .bub{background:#10243b;border:1px solid #1d4e7a}
.owner  .bub{background:#0f2a18;border:1px solid #1f5c33}
.med    .bub{background:#1c1630;border:1px solid #4a3a73;color:#d9ccf5}
.sys    .bub{background:#1a1407;border:1px solid #5c4a16;color:#e8d39a;font-size:.78rem;text-align:center}
.ts{font-size:.6rem;color:#5a6672;margin-top:2px}
.empty{color:var(--mut);text-align:center;padding:40px 14px}
.legend{display:flex;gap:10px;flex-wrap:wrap;font-size:.7rem;color:var(--mut);padding:8px 14px;border-top:1px solid var(--bd)}
.dot{display:inline-block;width:9px;height:9px;border-radius:50%;margin-left:4px;vertical-align:middle}
.refresh{background:var(--blu);color:#001;border:0;border-radius:7px;padding:4px 12px;font-size:.74rem;cursor:pointer;font-weight:700}
.bar{display:flex;gap:6px;flex-wrap:wrap}
.del{background:#2a1416;color:var(--red);border:1px solid var(--red);border-radius:7px;padding:4px 10px;font-size:.72rem;cursor:pointer;font-weight:700}
.del:hover{background:var(--red);color:#fff}
.filters{display:flex;gap:5px;flex-wrap:wrap;margin:2px 0}
.fchip{background:var(--card);border:1px solid var(--bd);color:var(--mut);border-radius:20px;padding:3px 11px;font-size:.72rem;cursor:pointer}
.fchip.on{background:var(--blu);border-color:var(--blu);color:#001;font-weight:700}
.fchip .n{opacity:.7;font-size:.66rem}
</style></head><body>
<header>
  <h1>💬 المحادثات (التجارب)</h1>
  <div class="sub">كل تفاوض = تجربة كاملة. المستأجر يمين 🟦 · المالك يسار 🟩 · الوسيط بينهما 🟪</div>
  <nav>
    <a href="/">🏠 الرئيسية</a>
    <a href="/dashboard/employees.html">👔 الموظفون</a>
    <a class="active" href="/dashboard/conversations.html">💬 المحادثات</a>
    <a href="/dashboard/lab.html">🔬 المختبر</a>
  </nav>
</header>
<div class="wrap">
  <div class="col-list">
    <div class="bar">
      <button class="refresh" onclick="loadList()">↻ تحديث</button>
      <button class="del" onclick="cleanupTests()">🗑️ حذف التجارب التجريبية</button>
    </div>
    <div class="filters" id="filters"></div>
    <div id="list"><div class="empty">…تحميل</div></div>
  </div>
  <div class="panel" id="panel">
    <div class="empty">اختر تجربة من القائمة لعرض محادثتها الكاملة 👉</div>
  </div>
</div>

<script>
const API='/api';
const STAT={agreed:['g','✅ تمّت'],active:['b','⏳ جارية'],cancelled:['r','✖ ملغاة'],
            declined:['r','✖ مرفوضة'],paused_test:['y','🧪 اختبار'],negotiating:['b','⏳ تفاوض']};
function statPill(s){const m=STAT[s]||['y',s||'—'];return `<span class="pill ${m[0]}">${m[1]}</span>`;}
function money(v){return v?Number(v).toLocaleString():'—';}
function when(t){if(!t)return'';try{const d=new Date(t);return d.toLocaleDateString('ar',{month:'short',day:'numeric'})+' '+d.toLocaleTimeString('ar',{hour:'2-digit',minute:'2-digit'});}catch(e){return''}}
let SEL=null, ALL=[], FILTER='all';

// تصنيف التجربة لأغراض الفلترة (غير حصري: تجربة قد تكون «تمّت» و«اختبار» معاً)
const isTest=n=>/^🧪/.test(n.listing_title||'')||n.status==='paused_test'
  ||/^(SIM|9665000|96655000|966548060060|966536882728)/.test(n.lead_phone||'')
  ||/^(SIM|9665000|96655000|966548060060|966536882728)/.test(n.listing_phone||'');
const FDEFS=[
  ['all','الكل', ()=>true],
  ['agreed','✅ تمّت', n=>n.status==='agreed'],
  ['test','🧪 اختبار', isTest],
  ['cancelled','✖ ملغاة', n=>['cancelled','declined'].includes(n.status)],
  ['active','⏳ جارية', n=>['active','negotiating'].includes(n.status)],
];
const pred=k=>(FDEFS.find(f=>f[0]===k)||FDEFS[0])[2];

function renderFilters(){
  document.getElementById('filters').innerHTML=FDEFS.map(([k,label,fn])=>{
    const cnt=ALL.filter(fn).length;
    return `<span class="fchip ${FILTER===k?'on':''}" onclick="setFilter('${k}')">${label} <span class="n">${cnt}</span></span>`;
  }).join('');
}
function setFilter(k){FILTER=k;renderFilters();renderList();}

function renderList(){
  const el=document.getElementById('list');
  const arr=ALL.filter(pred(FILTER));
  if(!arr.length){el.innerHTML='<div class="empty">لا تفاوضات بهذا التصنيف</div>';return;}
  el.innerHTML=arr.map(n=>{
    const c=n.status==='agreed'?'var(--grn)':n.status==='cancelled'||n.status==='declined'?'var(--red)':n.status==='paused_test'?'var(--yel)':'var(--blu)';
    const price=n.agreed_price?`✅ ${money(n.agreed_price)}`:(n.proposed_price?`📊 ${money(n.proposed_price)}`:money(n.listing_price));
    return `<div class="exp" id="exp-${n.id}" style="--c:${c}" onclick="openLog(${n.id})">
      <div class="top"><span class="id">#${n.id}</span>${statPill(n.status)}</div>
      <div class="meta">${(n.listing_title||'عقار').slice(0,30)} · ${n.listing_city||''} · ${price} ر</div>
      <div class="ph" dir="ltr">🧑 ${n.lead_phone||'—'} ↔ 🏠 ${n.listing_phone||'—'}</div>
      <div class="ph">${when(n.created_at)}</div>
    </div>`;}).join('');
  if(SEL){const e=document.getElementById('exp-'+SEL); if(e)e.classList.add('sel');}
}

async function loadList(){
  const el=document.getElementById('list');
  el.innerHTML='<div class="empty">…تحميل</div>';
  try{
    const r=await (await fetch(`${API}/negotiate/active`)).json();
    ALL=r.negotiations||[];
    if(!ALL.length){document.getElementById('filters').innerHTML='';el.innerHTML='<div class="empty">لا توجد تفاوضات بعد</div>';return;}
    renderFilters(); renderList();
  }catch(e){el.innerHTML='<div class="empty">⚠️ تعذّر التحميل</div>';}
}

async function cleanupTests(){
  const cnt=ALL.filter(isTest).length;
  if(!confirm(`سيُحذف نحو ${cnt} تفاوضاً تجريبياً (التجارب 🧪 + أرقام الاختبار + paused_test + SIM).\nالتفاوضات الحقيقية لن تُمَس. متابعة؟`))return;
  try{
    const r=await (await fetch(`${API}/negotiate/cleanup-tests`,{method:'POST'})).json();
    if(r.ok){
      if(SEL && !ALL.some(n=>n.id===SEL&&!isTest(n))){SEL=null;document.getElementById('panel').innerHTML='<div class="empty">اختر تجربة من القائمة 👉</div>';}
      alert(`تم حذف ${r.deleted} تفاوضاً تجريبياً ✅`);
      loadList();
    } else alert('تعذّر الحذف: '+(r.error||''));
  }catch(e){alert('تعذّر الاتصال بالخادم');}
}

// صنّف عنصر السجل إلى ممر/نوع
function classify(role){
  role=role||'';
  const isOwner=role.indexOf('مالك')>-1, isSeeker=role.indexOf('مستأجر')>-1;
  const isMed=role.indexOf('bot')>-1||role.indexOf('relay')>-1||role.indexOf('answer')>-1||role.indexOf('→')>-1;
  if(isMed && isSeeker) return {side:'right',cls:'med',who:'🤝 الوسيط ← المستأجر'};
  if(isMed && isOwner)  return {side:'left', cls:'med',who:'🤝 الوسيط ← المالك'};
  if(role==='مستأجر')   return {side:'right',cls:'seeker',who:'🧑 المستأجر'};
  if(role==='مالك')     return {side:'left', cls:'owner', who:'🏠 المالك'};
  return {side:'center',cls:'sys',who:'⚙️ النظام'};
}

async function openLog(id){
  SEL=id;
  document.querySelectorAll('.exp').forEach(x=>x.classList.remove('sel'));
  const e=document.getElementById('exp-'+id); if(e)e.classList.add('sel');
  const p=document.getElementById('panel');
  p.innerHTML='<div class="empty">…تحميل المحادثة</div>';
  try{
    const d=await (await fetch(`${API}/negotiate/${id}/log`)).json();
    if(d.error){p.innerHTML='<div class="empty">⚠️ '+d.error+'</div>';return;}
    const log=d.chat_log||[];
    const facts=[
      ['الحالة',statPill(d.status)],
      d.listing_city?['المدينة',d.listing_city]:null,
      ['السعر المعلن',money(d.listing_price)+' ر'],
      d.lead_max_price?['سقف المستأجر',money(d.lead_max_price)+' ر']:null,
      d.owner_min_price?['أرضية المالك',money(d.owner_min_price)+' ر']:null,
      d.proposed_price?['المقترح',money(d.proposed_price)+' ر']:null,
      d.agreed_price?['المتّفق',money(d.agreed_price)+' ر']:null,
      ['موافقات',`${d.lead_accepted?'مستأجر✅':'مستأجر⬜'} ${d.owner_accepted?'مالك✅':'مالك⬜'}`],
      d.admin_reason?['ملاحظة',d.admin_reason]:null,
    ].filter(Boolean);
    const head=`<div class="phead">
      <h3>تجربة #${d.id} — ${(d.listing_title||'عقار')}</h3>
      <div class="facts">${facts.map(f=>`<span class="fact">${f[0]}: <b>${f[1]}</b></span>`).join('')}</div>
      <div class="facts" style="margin-top:6px"><span class="fact" dir="ltr">🧑 ${d.lead_phone} ↔ 🏠 ${d.listing_phone}</span></div>
    </div>`;
    const body = log.length ? log.map(m=>{
      const k=classify(m.role);
      return `<div class="row ${k.side} ${k.cls}">
        <div class="who">${k.who}</div>
        <div class="bub">${(m.text||'').replace(/</g,'&lt;')}</div>
        ${m.timestamp?`<div class="ts" dir="ltr">${when(m.timestamp)}</div>`:''}
      </div>`;}).join('') : '<div class="empty">لا رسائل في هذه التجربة</div>';
    const legend=`<div class="legend">
      <span><i class="dot" style="background:#1d4e7a"></i>المستأجر</span>
      <span><i class="dot" style="background:#1f5c33"></i>المالك</span>
      <span><i class="dot" style="background:#4a3a73"></i>الوسيط</span>
      <span>عدد الرسائل: ${log.length}</span></div>`;
    p.innerHTML=head+`<div class="chat">${body}</div>`+legend;
  }catch(e){p.innerHTML='<div class="empty">⚠️ تعذّر تحميل المحادثة</div>';}
}
loadList();
</script>
</body></html>
