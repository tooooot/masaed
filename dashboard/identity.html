<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>🟣 هوية مساعد — تعديل</title>
<style>
:root{--bg:#0d1117;--card:#161b22;--border:#30363d;--text:#e6edf3;--muted:#8b949e;--green:#2ea043;--green-light:#3fb950;--blue:#58a6ff;--yellow:#e3b341;--red:#f85149}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--text);font-family:-apple-system,'Segoe UI',Tahoma,sans-serif;direction:rtl}
.wrap{max-width:760px;margin:0 auto;padding:16px}
header{position:sticky;top:0;z-index:5;background:linear-gradient(135deg,#0d1117,#161b22);border-bottom:1px solid var(--border);padding:14px 16px}
h1{font-size:1.1rem;margin:0 0 4px}
.sub{font-size:.74rem;color:var(--muted)}
.bar{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
.btn{padding:8px 14px;border-radius:10px;border:1px solid var(--border);background:var(--card);color:var(--text);font-size:.82rem;font-weight:700;cursor:pointer}
.btn-green{background:var(--green);color:#fff;border-color:var(--green)}
.btn-red{background:#f8514920;color:var(--red);border-color:#f8514940}
.field{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px;margin-bottom:12px}
.flabel{font-weight:700;font-size:.82rem;margin-bottom:6px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.badge{font-size:.62rem;padding:1px 7px;border-radius:20px;font-weight:700}
.b-edit{background:#e3b34120;color:var(--yellow)}
.b-def{background:#2ea04320;color:var(--green-light)}
textarea{width:100%;background:var(--bg);color:var(--text);border:1px solid var(--border);border-radius:8px;padding:9px;font-family:inherit;font-size:.84rem;line-height:1.7;resize:vertical;min-height:58px}
.hint{font-size:.68rem;color:var(--muted);margin-top:4px}
.reset1{font-size:.68rem;color:var(--blue);cursor:pointer;background:none;border:none;margin-right:auto}
.group{font-weight:800;font-size:.92rem;margin:18px 0 8px;color:var(--green-light)}
#status{font-size:.78rem;margin-top:8px}
a.back{color:var(--blue);text-decoration:none;font-size:.8rem}
</style>
</head>
<body>
<header>
  <div class="wrap" style="padding:0">
    <h1>🟣 هوية «مساعد» — التعديل المباشر</h1>
    <div class="sub">المصدر الواحد. أي تعديل هنا ينعكس على المحاكي والمختبرين والإطلاق فوراً. <a class="back" href="/">← الرئيسية</a></div>
    <div class="bar">
      <button class="btn btn-green" onclick="saveAll(this)">💾 حفظ الكل</button>
      <button class="btn btn-red" onclick="resetAll()">↩️ إرجاع للافتراضي</button>
      <button class="btn" onclick="load()">🔄 تحديث</button>
    </div>
    <div id="status"></div>
  </div>
</header>

<div class="wrap" id="form"><div style="text-align:center;padding:40px;color:var(--muted)">جارٍ التحميل…</div></div>

<script>
const API='/api';
let DATA=null;
const PLACEHOLDERS={
  outreach_seeker:'{greet} التحية · {url} رابط الإعلان',
  outreach_owner:'{greet} التحية · {url} رابط الإعلان',
  reg_confirm:'{fields} البيانات المستخرجة · {missing} النواقص',
  reg_done:'{page} رابط الصفحة',
  viewing_seeker_url:'{url} رابط الإعلان',
  alternatives_offer:'{alts} قائمة البدائل',
  alternative_chosen:'{title} اسم العرض',
};
const GROUPS=[
  ['🧬 الشخصية والمبادئ',['persona']],
  ['1️⃣ المبادرة',['outreach_seeker','outreach_owner']],
  ['3️⃣ التسجيل',['reg_confirm','reg_done','waiting_other']],
  ['4️⃣ المعاينة',['ask_owner_photos','photos_received','viewing_seeker_url','viewing_seeker_from_owner','viewing_owner','viewing_confirmed_seeker','viewing_confirmed_owner']],
  ['5️⃣ التفاوض',['negotiation_start_seeker','negotiation_start_owner']],
  ['6️⃣ البدائل',['alternatives_offer','alternatives_none','alternative_chosen']],
  ['🚪 الإلغاء',['cancel_to_party','cancel_to_other']],
];
function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function status(t,ok){const e=document.getElementById('status');e.textContent=t;e.style.color=ok?'var(--green-light)':'var(--red)';}

async function load(){
  let d;
  try{ const r=await fetch(`${API}/identity`); d=await r.json(); }catch(e){ document.getElementById('form').innerHTML='تعذّر الاتصال'; return; }
  if(!d||!d.ok){document.getElementById('form').innerHTML='تعذّر التحميل';return;}
  DATA=d;
  let h='';
  for(const g of GROUPS){
    const title=g[0], keys=g[1];
    h+=`<div class="group">${title}</div>`;
    if(keys[0]==='persona'){
      h+=fieldHtml('persona',d.fields.persona);
      const pe=d.fields.principles;
      h+=`<div class="field"><div class="flabel">المبادئ/القواعد ${(pe&&pe.edited)?'<span class="badge b-edit">مُعدّل</span>':'<span class="badge b-def">افتراضي</span>'}</div>
        <textarea id="fld_principles" rows="8">${esc((d.principles||[]).join('\n'))}</textarea>
        <div class="hint">سطر لكل مبدأ.</div></div>`;
    } else {
      for(const k of keys){ if(d.fields[k]) h+=fieldHtml(k,d.fields[k]); }
    }
  }
  document.getElementById('form').innerHTML=h;
}
function fieldHtml(k,f){
  const ph=PLACEHOLDERS[k];
  const rows=Math.max(2,Math.ceil((f.value||'').length/55));
  return `<div class="field">
    <div class="flabel">${esc(f.label)} ${f.edited?'<span class="badge b-edit">مُعدّل</span>':'<span class="badge b-def">افتراضي</span>'}
      <button class="reset1" onclick="resetField('${k}')">↺ الافتراضي</button></div>
    <textarea id="fld_${k}" rows="${rows}">${esc(f.value)}</textarea>
    ${ph?`<div class="hint">متغيّرات: ${esc(ph)}</div>`:''}
  </div>`;
}
function resetField(k){ if(DATA&&DATA.fields[k]){document.getElementById('fld_'+k).value=DATA.fields[k].default;} }

async function saveAll(btn){
  btn.disabled=true;status('جارٍ الحفظ…',true);
  const ov={};
  for(const k in DATA.fields){
    if(k==='principles') continue;
    const el=document.getElementById('fld_'+k); if(el) ov[k]=el.value;
  }
  const pr=document.getElementById('fld_principles');
  if(pr) ov.principles=pr.value.split('\n').map(s=>s.trim()).filter(Boolean);
  let d;
  try{ const r=await fetch(`${API}/identity`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({overrides:ov})}); d=await r.json(); }
  catch(e){ status('❌ تعذّر الاتصال',false); btn.disabled=false; return; }
  btn.disabled=false;
  if(d.ok){status(`✅ حُفظ (${d.saved_count} حقل مُعدّل). ينعكس فوراً على المحاكي والواتساب.`,true);load();}
  else status('❌ '+(d.error||'فشل'),false);
}
async function resetAll(){
  if(!confirm('إرجاع كل الهوية للقيم الافتراضية؟')) return;
  const r=await fetch(`${API}/identity/reset`,{method:'POST'});const d=await r.json();
  if(d.ok){status('↩️ أُعيدت للافتراضي.',true);load();}
}
load();
</script>
</body>
</html>
