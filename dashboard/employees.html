<!DOCTYPE html>
<html lang="ar" dir="rtl"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>لوحة الموظفين — مساعد</title>
<style>
:root{--bg:#0f1419;--card:#1a2129;--bd:#2a3540;--tx:#e6edf3;--mut:#8b98a5;--pur:#a371f7;--grn:#3fb950;--yel:#d29922;--red:#f85149;--blu:#58a6ff;--org:#e3914e;}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--tx);font-family:-apple-system,"Segoe UI",Tahoma,sans-serif;line-height:1.6;padding:0 0 60px}
header{background:linear-gradient(135deg,#1a2129,#0f1419);border-bottom:1px solid var(--bd);padding:18px 22px;position:sticky;top:0;z-index:5}
h1{margin:0;font-size:1.25rem}
.sub{color:var(--mut);font-size:.82rem;margin-top:3px}
nav{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}
nav a{background:var(--card);border:1px solid var(--bd);color:var(--tx);text-decoration:none;padding:6px 12px;border-radius:8px;font-size:.8rem}
nav a.active{background:var(--blu);border-color:var(--blu);color:#001}
.wrap{max-width:960px;margin:0 auto;padding:18px}
.emp{background:var(--card);border:1px solid var(--bd);border-radius:12px;margin-bottom:14px;overflow:hidden;border-right:4px solid var(--c,var(--bd))}
.emp-h{display:flex;align-items:center;gap:10px;padding:14px 16px;cursor:pointer;user-select:none}
.emp-h h3{margin:0;font-size:1.02rem;flex:1}
.emp-h .cnt{background:#0b0f14;border:1px solid var(--bd);border-radius:20px;padding:2px 10px;font-size:.75rem;color:var(--mut)}
.emp-h .chev{color:var(--mut);transition:transform .2s}
.emp.open .chev{transform:rotate(90deg)}
.emp-body{display:none;padding:0 16px 16px;font-size:.85rem}
.emp.open .emp-body{display:block}
.role{color:var(--mut);font-size:.8rem;margin-bottom:10px}
table{width:100%;border-collapse:collapse;font-size:.8rem}
th,td{border-bottom:1px solid var(--bd);padding:6px 8px;text-align:right;vertical-align:top}
th{color:var(--mut);font-weight:600;font-size:.72rem}
.pill{display:inline-block;padding:1px 7px;border-radius:5px;font-size:.68rem;border:1px solid var(--bd)}
.pill.g{color:var(--grn);border-color:var(--grn)} .pill.y{color:var(--yel);border-color:var(--yel)}
.pill.b{color:var(--blu);border-color:var(--blu)} .pill.r{color:var(--red);border-color:var(--red)}
a.lnk{color:var(--blu)}
.empty{color:var(--mut);text-align:center;padding:14px}
.refresh{background:var(--blu);color:#001;border:0;border-radius:7px;padding:4px 10px;font-size:.72rem;cursor:pointer;font-weight:700}
.simbtn{background:#2a1f0e;color:var(--org);border:1px solid var(--org);border-radius:7px;padding:3px 9px;font-size:.72rem;cursor:pointer;font-weight:700}
.simbtn:hover{background:var(--org);color:#001}
.modal{position:fixed;inset:0;background:rgba(0,0,0,.7);display:none;z-index:20;padding:18px;overflow:auto}
.modal.open{display:block}
.mbox{max-width:760px;margin:20px auto;background:var(--card);border:1px solid var(--bd);border-radius:14px;overflow:hidden}
.mhead{padding:12px 16px;border-bottom:1px solid var(--bd);background:#0b0f14;display:flex;justify-content:space-between;align-items:center}
.mhead h3{margin:0;font-size:1rem}
.mclose{background:none;border:1px solid var(--bd);color:var(--mut);border-radius:7px;padding:3px 10px;cursor:pointer}
.mbody{padding:14px;max-height:70vh;overflow:auto}
.errbar{border-radius:10px;padding:10px 12px;margin-bottom:12px;font-size:.84rem}
.errbar.ok{background:#0f2a18;border:1px solid #1f5c33;color:#7ee2a0}
.errbar.bad{background:#2a1416;border:1px solid var(--red);color:#ffb3b0}
.erritem{font-size:.8rem;margin-top:5px}
.erritem .sev{font-size:.64rem;border-radius:5px;padding:1px 6px;border:1px solid;margin-left:5px}
.sev.high{color:var(--red);border-color:var(--red)} .sev.med{color:var(--yel);border-color:var(--yel)} .sev.low{color:var(--mut);border-color:var(--mut)}
.crow{display:flex;flex-direction:column;max-width:80%;margin-bottom:9px}
.crow.s{align-self:flex-start}.crow.o{align-self:flex-end}.crow.m{align-self:center;max-width:92%}
.cwho{font-size:.66rem;color:var(--mut);margin-bottom:2px}
.cbub{padding:7px 10px;border-radius:11px;font-size:.83rem;white-space:pre-wrap}
.crow.s .cbub{background:#10243b;border:1px solid #1d4e7a}
.crow.o .cbub{background:#0f2a18;border:1px solid #1f5c33}
.crow.m .cbub{background:#1c1630;border:1px solid #4a3a73;color:#d9ccf5}
</style></head><body>
<header>
  <h1>👔 لوحة الموظفين</h1>
  <div class="sub">كل موظف وقسمه ومخرجاته الحيّة. اضغط على أي موظف لفتح بياناته.</div>
  <nav>
    <a href="/">🏠 الرئيسية</a>
    <a class="active" href="/dashboard/employees.html">👔 الموظفون</a>
    <a href="/dashboard/conversations.html">💬 المحادثات</a>
    <a href="/dashboard/code.html">🗂️ خريطة الكود</a>
    <a href="/dashboard/pipeline.html">🔬 خلف الكواليس</a>
    <a href="/dashboard/lab.html">🔬 المختبر</a>
  </nav>
</header>
<div class="wrap" id="wrap"></div>

<script>
const API='/api';
const EMP=[
 {id:'memory', icon:'🧠', name:'مساعد الحافظ', c:'var(--pur)', role:'الذاكرة وملفات العملاء',
  url:'/contacts', key:'contacts', render:c=>`<tr><td>${c.name||'—'}</td><td dir=ltr>${c.phone}</td><td>${c.last_reg_type||'—'}</td><td>${c.total_regs||0}</td><td>${(c.notes||'').slice(0,40)}</td></tr>`,
  head:'<tr><th>الاسم</th><th>الرقم</th><th>الدور</th><th>تسجيلات</th><th>ملاحظات</th></tr>'},
 {id:'reg', icon:'📝', name:'مساعد المسجّل والمعدّل', c:'var(--org)', role:'العقارات والطلبات المسجّلة (تتحدّث فوراً)',
  url:'/registrations', key:'registrations', render:r=>`<tr><td>${r.name||'—'}</td><td>${r.type==='listing'?'🏠 عرض':'🔍 طلب'}</td><td>${r.city||'—'}</td><td>${r.rooms||'—'}</td><td><span class="pill ${r.status==='complete'?'g':'y'}">${r.status}</span></td></tr>`,
  head:'<tr><th>الاسم</th><th>النوع</th><th>المدينة</th><th>غرف</th><th>الحالة</th></tr>'},
 {id:'sourcing', icon:'🔍', name:'مساعد الطلبات والمطابقة', c:'var(--blu)', role:'العروض المسحوبة من حراج',
  url:'/listings?limit=50', key:'listings', render:l=>`<tr><td>${(l.title||'').slice(0,45)}</td><td>${l.city||'—'}</td><td>${l.price?Number(l.price).toLocaleString():'—'}</td><td><span class="pill ${l.status==='active'?'g':l.status==='contacted'?'y':'b'}">${l.status}</span></td><td>${l.url?`<a class=lnk href="${l.url}" target=_blank>🔗</a>`:''}</td></tr>`,
  head:'<tr><th>العنوان</th><th>المدينة</th><th>السعر</th><th>الحالة</th><th>إعلان</th></tr>'},
 {id:'deals', icon:'📋', name:'مساعد مُعِدّ الصفقة', c:'var(--org)', role:'الصفقات الجاهزة — جرّب «محاكاة الصفقة» قبل بدء التفاوض الحقيقي',
  url:'/deals', key:'deals', render:d=>{const o=(d.deal_file||{}).offer||{};return `<tr><td dir=ltr>${d.seeker_phone}</td><td dir=ltr>${d.listing_phone||'—'}</td><td>${(o.title||'').slice(0,30)}</td><td><span class="pill ${d.status==='agreed'?'g':d.status==='negotiating'?'b':d.status==='failed'?'r':'y'}">${d.status}</span></td><td><button class="simbtn" onclick="simDeal('${d.seeker_phone}','${d.listing_phone||''}')">🧪 محاكاة</button></td></tr>`},
  head:'<tr><th>الباحث</th><th>المالك</th><th>العرض</th><th>الحالة</th><th>محاكاة قبل البدء</th></tr>'},
 {id:'negotiator', icon:'💬', name:'مساعد المفاوض', c:'var(--grn)', role:'التفاوضات الجارية وحالة آلة الحالات',
  url:'/negotiate/active', key:'negotiations', render:n=>`<tr><td dir=ltr>${n.lead_phone||'—'}</td><td dir=ltr>${n.listing_phone||'—'}</td><td>${(n.listing_title||'').slice(0,30)}</td><td><span class="pill b">${n.status||'active'}</span></td></tr>`,
  head:'<tr><th>المستأجر</th><th>المالك</th><th>العقار</th><th>الحالة</th></tr>'},
];

function box(e){return `<div class="emp" id="emp-${e.id}" style="--c:${e.c}">
  <div class="emp-h" onclick="toggle('${e.id}')">
    <span style="font-size:1.3rem">${e.icon}</span>
    <h3>${e.name}</h3><span class="cnt" id="cnt-${e.id}">…</span>
    <button class="refresh" onclick="event.stopPropagation();load('${e.id}')">↻</button>
    <span class="chev">▶</span>
  </div>
  <div class="emp-body"><div class="role">${e.role}</div><div id="data-${e.id}"><div class="empty">…تحميل</div></div></div>
</div>`;}

// المختبر: قسم خاص
function testerBox(){return `<div class="emp" id="emp-tester" style="--c:var(--blu)">
  <div class="emp-h" onclick="toggle('tester')"><span style="font-size:1.3rem">🧪</span>
    <h3>مساعد المختبر</h3><span class="cnt" id="cnt-tester">⚙️</span><span class="chev">▶</span></div>
  <div class="emp-body"><div class="role">المحاكاة ووضع الاختبار (أرقامك)</div>
    <div id="data-tester">…</div>
    <a class="lnk" href="/dashboard/lab.html">→ افتح المختبر الكامل</a></div></div>`;}

document.getElementById('wrap').innerHTML = EMP.map(box).join('') + testerBox();

function toggle(id){const el=document.getElementById('emp-'+id);el.classList.toggle('open');
  if(el.classList.contains('open')) load(id);}

async function load(id){
  if(id==='tester'){
    try{const c=await (await fetch(`${API}/config/test`)).json();
      document.getElementById('data-tester').innerHTML=`وضع الاختبار: <span class="pill ${c.test_mode==='on'?'g':'y'}">${c.test_mode}</span> · باحث: <span dir=ltr>${c.test_seeker||'—'}</span> · مالك: <span dir=ltr>${c.test_owner||'—'}</span>`;
    }catch(e){}
    return;
  }
  const e=EMP.find(x=>x.id===id); if(!e)return;
  const t=document.getElementById('data-'+id); t.innerHTML='<div class="empty">…تحميل</div>';
  try{
    const r=await (await fetch(`${API}${e.url}`)).json();
    const arr=r[e.key]||[];
    document.getElementById('cnt-'+id).textContent=r.count!=null?r.count:arr.length;
    t.innerHTML = arr.length ? `<table>${e.head}${arr.map(e.render).join('')}</table>`
                             : '<div class="empty">لا بيانات</div>';
  }catch(err){ t.innerHTML='<div class="empty">⚠️ تعذّر التحميل</div>'; }
}
// ── محاكاة الصفقة قبل البدء (المرحلة ٣) ──────────────────────────────────
function mclose(){document.getElementById('simModal').classList.remove('open');}
function cls(role){const r=role||'';return r.indexOf('مالك')>-1?'o':(r.indexOf('مستأجر')>-1?'s':'m');}
function who(role){const r=role||'';return r.indexOf('مالك')>-1?'🏠 المالك':(r.indexOf('مستأجر')>-1?'🧑 المستأجر':'🤝 الوسيط');}

async function simDeal(seeker, listing){
  let modal=document.getElementById('simModal');
  if(!modal){modal=document.createElement('div');modal.id='simModal';modal.className='modal';
    modal.innerHTML='<div class="mbox"><div class="mhead"><h3>🧪 محاكاة الصفقة</h3><button class="mclose" onclick="mclose()">إغلاق ✕</button></div><div class="mbody" id="simBody"></div></div>';
    document.body.appendChild(modal);}
  const body=document.getElementById('simBody');
  modal.classList.add('open');
  body.innerHTML='<div class="empty">⏳ يجري تحضير الوكلاء وتشغيل المحاكاة… (دقيقة–دقيقتان)</div>';
  try{
    const start=await (await fetch(`${API}/lab/simulate-deal`,{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({seeker_phone:seeker,listing_phone:listing})})).json();
    if(!start.ok){body.innerHTML='<div class="errbar bad">تعذّر البدء: '+(start.error||'')+'</div>';return;}
    const job=start.job_id;
    let res=null;
    for(let i=0;i<40;i++){
      await new Promise(r=>setTimeout(r,4000));
      const s=await (await fetch(`${API}/lab/simulate-status?job_id=${job}`)).json();
      body.innerHTML=`<div class="empty">⏳ ${s.stage||'يعمل'}… (${i*4}ث)</div>`;
      if(s.status==='done'){res=s.result;break;}
      if(s.status==='error'){body.innerHTML='<div class="errbar bad">خطأ: '+(s.error||'')+'</div>';return;}
    }
    if(!res){body.innerHTML='<div class="errbar bad">انتهت المهلة</div>';return;}
    renderSim(body,res);
  }catch(e){body.innerHTML='<div class="errbar bad">⚠️ تعذّر الاتصال</div>';}
}

function renderSim(body,res){
  const sim=res.simulation||{}, fe=res.fact_errors||[], msgs=sim.messages||[];
  const head=`<div style="font-size:.82rem;color:var(--mut);margin-bottom:10px">
    الحالة: <b>${sim.final_status||'—'}</b> · السعر المتّفق: <b>${sim.agreed_price?Number(sim.agreed_price).toLocaleString():'—'}</b> · جولات: ${sim.rounds||'—'}</div>`;
  let err;
  if(!fe.length){err='<div class="errbar ok">✅ لا أخطاء حقائق مرصودة — الصفقة متّسقة.</div>';}
  else{err='<div class="errbar bad">🔍 رُصد '+fe.length+' خلل في اتساق الصفقة:'+
    fe.map(i=>`<div class="erritem"><span class="sev ${i.sev}">${i.sev==='high'?'حرج':i.sev==='med'?'متوسط':'بسيط'}</span><b>${i.type}:</b> ${i.detail}</div>`).join('')+'</div>';}
  const chat=msgs.map(m=>`<div class="crow ${cls(m.from)}"><div class="cwho">${who(m.from)}</div><div class="cbub">${(m.text||'').replace(/</g,'&lt;')}</div></div>`).join('');
  body.innerHTML=head+err+'<div style="border-top:1px solid var(--bd);margin:8px 0;padding-top:8px;font-size:.78rem;color:var(--mut)">مجرى الحوار:</div>'+chat;
}

// افتح الحافظ افتراضياً
toggle('memory');
</script>
</body></html>
