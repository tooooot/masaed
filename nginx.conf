server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Proxy all /api/* requests to the scraper service
    location /api/ {
        rewrite ^/api/(.*) /$1 break;
        proxy_pass http://masaed-scraper:5555;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
    }

    # Proxy bot webhook to scraper
    location /bot/ {
        proxy_pass http://masaed-scraper:5555/bot/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }

    # Serve photos uploaded by bot (stored in scraper container volume)
    location /photos/ {
        proxy_pass http://masaed-scraper:5555/photos/;
        proxy_set_header Host $host;
        proxy_read_timeout 30s;
    }

    # Profile deep-link pages: /p/<id> → profile.html (JS fetches /api/profile/<id>)
    location ~ ^/p/[^/]+$ {
        try_files /profile.html =404;
    }

    # Serve static files
    location / {
        try_files $uri $uri.html $uri/ =404;
    }
}
