server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Proxy all /api/* requests to the scraper service
    location /api/ {
        rewrite ^/api/(.*) /$1 break;
        proxy_pass http://masaed-scraper:5555;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
    }

    # Serve static files
    location / {
        try_files $uri $uri.html $uri/ =404;
    }
}
