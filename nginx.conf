server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # ── Docker embedded DNS resolver ──────────────────────────────────────────
    # Forces nginx to re-resolve upstream hostnames at request time (via the
    # $upstream variable below) instead of caching the IP once at startup.
    # This survives masaed-scraper restarts that change its container IP.
    resolver 127.0.0.11 valid=10s ipv6=off;
    set $upstream masaed-scraper:5555;

    # ── Never serve hidden/dotfiles (e.g. .htpasswd lives under the html mount) ─
    location ~ /\. {
        deny all;
        return 404;
    }

    # Proxy all /api/* requests to the scraper service (no auth)
    location /api/ {
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        rewrite ^/api/(.*) /$1 break;
        proxy_pass http://$upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
    }

    # Bot webhook does NOT require auth (Green API calls it)
    location /bot/ {
        proxy_pass http://$upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }

    # Serve photos uploaded by bot (stored in scraper container volume)
    location /photos/ {
        proxy_pass http://$upstream;
        proxy_set_header Host $host;
        proxy_read_timeout 30s;
    }

    # ── Public pages (no auth) ────────────────────────────────────────────────
    # Profile deep-link pages: /p/<id> → profile.html (JS fetches /api/profile/<id>)
    # These are visible to end-users, no auth required
    location ~ ^/p/[^/]+$ {
        try_files /profile.html =404;
    }

    # Serve static files
    location / {
        try_files $uri $uri.html $uri/ =404;
    }

    # لا تخزين مخبوء لصفحات HTML (كي يحصل المتصفح دائماً على آخر نسخة)
    location ~* \.html$ {
        add_header Cache-Control "no-cache, must-revalidate";
        try_files $uri =404;
    }
}
