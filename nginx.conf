server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # ── Dashboard requires HTTP Basic Auth ────────────────────────────────────
    # Generate password:
    # echo -n "admin:masaed_pass" | openssl dgst -md5 -hex
    # Or use: htpasswd -c .htpasswd admin
    # Then mount .htpasswd into nginx container
    auth_basic_user_file /etc/nginx/.htpasswd;

    # ── Protected routes (require auth) ────────────────────────────────────────
    location ~ ^/(index\.html|dashboard|profile\.html|registrar\.html|api/|admin)$ {
        auth_basic "مساعد Dashboard (Admin Only)";
        auth_basic_user_file /etc/nginx/.htpasswd;
        try_files $uri $uri.html =404;
    }

    # Proxy all /api/* requests to the scraper service
    location /api/ {
        auth_basic "مساعد API";
        auth_basic_user_file /etc/nginx/.htpasswd;
        rewrite ^/api/(.*) /$1 break;
        proxy_pass http://masaed-scraper:5555;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
    }

    # Bot webhook does NOT require auth (Green API calls it)
    location /bot/ {
        proxy_pass http://masaed-scraper:5555/bot/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }

    # Serve photos uploaded by bot (stored in scraper container volume)
    location /photos/ {
        proxy_pass http://masaed-scraper:5555/photos/;
        proxy_set_header Host $host;
        proxy_read_timeout 30s;
    }

    # ── Public pages (no auth) ────────────────────────────────────────────────
    # Profile deep-link pages: /p/<id> → profile.html (JS fetches /api/profile/<id>)
    # These are visible to end-users, no auth required
    location ~ ^/p/[^/]+$ {
        try_files /profile.html =404;
    }

    # Serve static files (with auth for sensitive ones)
    location / {
        try_files $uri $uri.html $uri/ =404;
    }
}
